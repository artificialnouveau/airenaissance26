<style>
/* ============================================================
   Tokens
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:   #0b1220;
  --ink:    #111827;
  --text:   #1f2937;
  --muted:  #6b7280;
  --faint:  #9ca3af;
  --line:   #e8eaed;
  --line-2: #f0f1f3;
  --bg:     #f4f5f7;
  --panel:  #ffffff;
  --accent: #3b6fe0;
  --accent-d:#2b54b8;
  --green:  #12a150;
  --amber:  #f59e0b;
  --red:    #e0414b;
  --r-sm: 8px;
  --r:    12px;
  --r-lg: 16px;
  --sh-1: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.05);
  --sh-2: 0 4px 12px rgba(16,24,40,.08), 0 2px 4px rgba(16,24,40,.04);
  --sh-3: 0 12px 32px rgba(16,24,40,.14), 0 4px 8px rgba(16,24,40,.06);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  color: var(--text);
  background: radial-gradient(1200px 600px at 80% -10%, #eef2fb 0%, var(--bg) 55%) fixed;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.hidden { display: none !important; }

/* ============================================================
   Top bar
   ============================================================ */
#topbar {
  background: linear-gradient(180deg, #0e1729 0%, #0b1220 100%);
  color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 60px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 rgba(255,255,255,.04), 0 6px 24px rgba(0,0,0,.25);
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.title-block h1 { font-size: 15px; font-weight: 650; color: #fff; line-height: 1.2; letter-spacing: .2px; }
.title-block .subtitle { font-size: 10.5px; color: #8da2c0; letter-spacing: 1.5px; text-transform: uppercase; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.ext-link { color: #9fb2cf; font-size: 13px; padding: 6px 10px; border-radius: 8px; transition: all .15s; }
.ext-link:hover { background: rgba(255,255,255,.08); color: #fff; text-decoration: none; }
#sync-status { font-size: 12px; color: #6ee7a8; min-width: 54px; }

/* ============================================================
   Session / mode bar
   ============================================================ */
#session-bar {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 12px 24px; background: var(--panel); border-bottom: 1px solid var(--line);
  position: sticky; top: 60px; z-index: 80; box-shadow: var(--sh-1);
}
.mode-switch { display: inline-flex; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 3px; }
.mode-btn {
  border: none; background: transparent; color: var(--muted);
  font-size: 12.5px; font-weight: 600; padding: 7px 16px; border-radius: 7px; cursor: pointer; transition: all .15s;
}
.mode-btn.active { background: var(--panel); color: var(--ink); box-shadow: var(--sh-1); }
.session-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
#session-name {
  border: 1px solid var(--line); border-radius: 9px; padding: 8px 12px; font-size: 13px;
  font-family: inherit; width: 150px; outline: none; transition: border-color .15s, box-shadow .15s;
}
#session-name:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,111,224,.12); }
#load-session {
  border: 1px solid var(--line); border-radius: 9px; padding: 8px 12px; font-size: 13px;
  font-family: inherit; background: var(--panel); color: var(--text); cursor: pointer; outline: none; max-width: 220px;
}
.session-status { font-size: 12.5px; color: var(--green); font-weight: 550; }
.collab-legend { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
.collab-legend .legend-dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #6ea8ff); }

/* ============================================================
   Content
   ============================================================ */
#content { max-width: 1400px; margin: 0 auto; padding: 28px 24px 96px; }
#loading { text-align: center; color: var(--muted); padding: 90px; font-size: 15px; }

#content { max-width: none; padding: 0; position: relative; }

/* phase header rail */
#phase-rail { display: flex; gap: 8px; overflow-x: auto; padding: 9px 16px; background: var(--panel); border-bottom: 1px solid var(--line); box-shadow: var(--sh-1); }
.phase-chip { --bc: var(--accent); flex: 0 0 auto; min-width: 158px; border: 1px solid var(--line); border-top: 3px solid var(--bc); border-radius: 10px; padding: 7px 9px; background: linear-gradient(180deg, color-mix(in srgb, var(--bc) 8%, #fff), var(--panel)); cursor: grab; transition: box-shadow .12s, opacity .12s; }
.phase-chip:active { cursor: grabbing; }
.phase-chip.active { box-shadow: 0 0 0 2px color-mix(in srgb, var(--bc) 42%, transparent); }
.phase-chip.dragging { opacity: .45; }
.phase-chip.drop-target { box-shadow: -3px 0 0 0 var(--bc); }
.phase-name { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--ink); cursor: pointer; white-space: nowrap; }
.phase-grip { width: 7px; height: 13px; background: radial-gradient(circle, var(--faint) 1px, transparent 1.4px) 0 0 / 3.5px 4px; opacity: .55; flex-shrink: 0; }
.phase-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--bc); flex-shrink: 0; }
.phase-acts { display: flex; gap: 4px; margin-top: 7px; }
.phase-acts .btn-sm { padding: 3px 7px; font-size: 10.5px; }

#graph { width: 100%; height: calc(100vh - 280px); min-height: 440px; overflow: auto; background:
  radial-gradient(circle at 1px 1px, rgba(16,24,40,.05) 1px, transparent 0) 0 0 / 24px 24px,
  linear-gradient(180deg, #fbfcfe, #f4f6f9); outline: none; }

/* ---- Outline empty-state ---- */
.flow-empty { color: var(--muted); font-size: 14px; padding: 60px 20px; text-align: center; }

/* ---- Sections (one self-contained tree per A/B/C...) + convergence ---- */
.sections { display: flex; flex-direction: column; gap: 0; padding: 0 0 50px; }
.tsection { --bc: var(--accent); border-bottom: 1px solid var(--line); padding: 20px 26px 8px; }
.tsection-head { display: flex; align-items: center; gap: 10px; }
.tsection-badge { font-size: 13px; font-weight: 800; color: #fff; min-width: 26px; text-align: center; padding: 3px 9px; border-radius: 8px; }
.tsection-name { font-size: 17px; font-weight: 780; color: var(--ink); letter-spacing: -.2px; }
.tsection-acts { display: flex; gap: 4px; margin-left: 8px; opacity: 0; transition: opacity .15s; }
.tsection:hover .tsection-acts { opacity: 1; }
.tsection-desc { font-size: 12.5px; color: var(--muted); line-height: 1.55; margin: 6px 0 0; max-width: 80ch; }
.tsection .tree { padding: 6px 8px 18px; }

/* final convergence block */
.tsection-final { background: linear-gradient(180deg, #f6f8fc, #fff); border-top: 2px solid var(--line); }
.tsection-final .tsection-badge { background: var(--navy); }
.converge { display: flex; flex-direction: column; align-items: center; padding: 18px 8px 8px; }
.cv-cards { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
.cv-card { --bc: var(--accent); width: 210px; background: #fff; border: 1px solid var(--line); border-top: 4px solid var(--bc);
  border-radius: var(--r); box-shadow: var(--sh-1); padding: 10px 12px 12px; cursor: pointer; transition: box-shadow .12s, transform .1s; }
.cv-card:hover { box-shadow: var(--sh-2); transform: translateY(-1px); }
.cv-card-h { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
.cv-card-badge { font-size: 10px; font-weight: 800; color: #fff; padding: 2px 7px; border-radius: 6px; }
.cv-card-name { font-size: 12px; font-weight: 700; color: var(--ink); line-height: 1.25; }
.cv-card-decs { display: flex; flex-direction: column; gap: 5px; }
.cv-dec { font-size: 11.5px; font-weight: 650; color: var(--accent-d); background: #eef3fe; border: 1px solid #dde7fb; border-radius: 8px; padding: 4px 8px; line-height: 1.3; }
.cv-card-empty { font-size: 11px; color: var(--faint); font-style: italic; }
.cv-arrow { font-size: 30px; line-height: 1; color: var(--faint); margin: 10px 0; }
.cv-final { background: linear-gradient(135deg, var(--navy), #1b2942); color: #fff; border-radius: var(--r-lg);
  padding: 16px 28px; text-align: center; box-shadow: var(--sh-2); }
.cv-final-t { font-size: 17px; font-weight: 780; letter-spacing: -.2px; }
.cv-final-s { font-size: 12px; color: #9fb2cf; margin-top: 2px; }

/* ============================================================
   Collapsible outline (Section > Question > Choice)
   ============================================================ */
.outline { max-width: 940px; margin: 16px auto 0; background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--sh-2); overflow: hidden; }
.sections { max-width: 940px; margin: 0 auto; }
.ol-empty { font-size: 12px; color: var(--faint); padding: 6px 0 8px; }

.ol-section { --bc: var(--accent); border-bottom: 1px solid var(--line); }
.ol-section:last-child { border-bottom: none; }
.ol-sec-head { display: flex; align-items: center; gap: 10px; padding: 14px 20px; cursor: pointer; transition: background .12s; border-left: 4px solid var(--bc); }
.ol-sec-head:hover { background: #fafbfd; }
.ol-caret { font-size: 11px; color: var(--faint); width: 12px; text-align: center; flex-shrink: 0; }
.ol-sec-badge { font-size: 12px; font-weight: 800; color: #fff; min-width: 24px; text-align: center; padding: 3px 8px; border-radius: 7px; }
.ol-sec-name { font-size: 15.5px; font-weight: 760; color: var(--ink); letter-spacing: -.2px; }
.ol-sec-count { font-size: 11.5px; color: var(--faint); font-weight: 600; }
.ol-acts { display: flex; gap: 3px; margin-left: auto; opacity: 0; transition: opacity .15s; }
.ol-sec-head:hover .ol-acts, .ol-q-head:hover .ol-acts, .ol-opt:hover .ol-acts { opacity: 1; }
.ol-sec-body { padding: 2px 20px 14px 38px; }
.ol-sec-desc { font-size: 12px; color: var(--muted); line-height: 1.55; margin: 4px 0 10px; max-width: 80ch; }

.ol-q { --bc: var(--accent); border-left: 2px solid color-mix(in srgb, var(--bc) 28%, var(--line)); margin: 7px 0; }
.ol-q-head { display: flex; align-items: center; gap: 9px; padding: 9px 12px; cursor: pointer; border-radius: 8px; transition: background .12s; }
.ol-q-head:hover { background: color-mix(in srgb, var(--bc) 5%, #fff); }
.ol-q-head.active { background: color-mix(in srgb, var(--bc) 10%, #fff); }
.ol-q-id { font-size: 10px; font-weight: 800; color: #fff; background: var(--bc); padding: 2px 7px; border-radius: 999px; flex-shrink: 0; }
.ol-q-text { font-size: 13.5px; font-weight: 680; color: var(--ink); line-height: 1.3; }
.ol-q-count { font-size: 11px; color: var(--faint); margin-left: auto; white-space: nowrap; flex-shrink: 0; }
.ol-q-chosen { font-size: 11px; font-weight: 700; color: #fff; background: var(--green); padding: 2px 10px; border-radius: 999px; margin-left: auto; white-space: nowrap; max-width: 260px; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.ol-q-head .ol-acts { margin-left: 10px; }
.ol-q-body { padding: 4px 0 10px 36px; }
.ol-q-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }

.ol-opt { --bc: var(--accent); position: relative; display: flex; align-items: flex-start; gap: 12px; padding: 11px 13px; margin: 7px 0;
  border: 1.5px solid var(--line); border-radius: 10px; background: #fff; cursor: pointer; transition: border-color .12s, background .12s, box-shadow .12s; }
.ol-opt:hover { border-color: color-mix(in srgb, var(--bc) 50%, var(--line)); background: color-mix(in srgb, var(--bc) 4%, #fff); box-shadow: var(--sh-1); }
.ol-opt-pick { width: 19px; height: 19px; border-radius: 50%; border: 2px solid #c9d2dd; flex-shrink: 0; margin-top: 1px; transition: all .12s; }
.ol-opt:hover .ol-opt-pick { border-color: var(--bc); }
.ol-opt.is-chosen { border-color: var(--green); background: linear-gradient(180deg, #eef9f1, #fff); box-shadow: 0 0 0 1px color-mix(in srgb, var(--green) 35%, transparent); }
.ol-opt.is-chosen .ol-opt-pick { border-color: var(--green); background: var(--green); box-shadow: inset 0 0 0 3px #fff; }
.ol-opt-main { flex: 1; min-width: 0; }
.ol-opt-label { font-size: 13.5px; font-weight: 700; color: var(--ink); line-height: 1.3; }
.ol-opt-what { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 3px; }
.ol-opt-trade { font-size: 11.5px; line-height: 1.45; margin-top: 4px; }
.ol-trade-k { font-weight: 800; text-transform: uppercase; letter-spacing: .4px; font-size: 9.5px; color: var(--amber); }
.ol-trade-v { color: var(--muted); }
.ol-opt-leads { display: inline-block; font-size: 10.5px; font-weight: 700; color: var(--accent-d); margin-top: 6px; cursor: pointer; }
.ol-opt-leads:hover { text-decoration: underline; }
.ol-opt-badge { font-size: 11px; font-weight: 750; color: var(--muted); background: var(--bg); border: 1px solid var(--line); min-width: 22px; text-align: center; padding: 2px 8px; border-radius: 999px; flex-shrink: 0; align-self: flex-start; }
.ol-opt-badge.zero { color: var(--faint); }
.ol-addopt { margin-top: 4px; background: transparent; border: 1px dashed #d3d9e2; color: var(--muted); font-size: 11.5px; font-weight: 600; padding: 7px 12px; border-radius: 9px; cursor: pointer; transition: all .14s; }
.ol-addopt:hover { border-color: var(--accent); color: var(--accent); background: #f5f8ff; }

/* multiple-choice questions */
.ol-q-multi { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--accent-d); background: #eef3fe; border: 1px solid #dde7fb; padding: 1px 6px; border-radius: 999px; margin-left: 8px; flex-shrink: 0; }
.ol-q-multihint { font-size: 11px; font-weight: 700; color: var(--accent-d); margin: 0 0 7px; }
.ol-opt-pick.multi { border-radius: 6px; }
.ol-opt.is-chosen .ol-opt-pick.multi { box-shadow: inset 0 0 0 3px #fff; }

/* persona tags (derived from choices) */
.ol-opt-persona { font-size: 9.5px; font-weight: 800; letter-spacing: .3px; background: #fff; border: 1.5px solid currentColor; padding: 2px 8px; border-radius: 999px; flex-shrink: 0; align-self: flex-start; white-space: nowrap; }
.ol-sec-persona { font-size: 10.5px; font-weight: 800; color: #fff; padding: 3px 10px; border-radius: 999px; margin-left: 6px; flex-shrink: 0; white-space: nowrap; }
.cv-persona { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin: 14px 0 4px; padding: 12px 14px; background: #fff; border: 1px solid var(--line); border-radius: var(--r); box-shadow: var(--sh-1); }
.cv-persona-k { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
.cv-persona-pill { font-size: 14px; font-weight: 800; color: #fff; padding: 4px 14px; border-radius: 999px; }
.cv-persona-bd { display: flex; flex-wrap: wrap; gap: 6px; margin-left: auto; }
.cv-persona-chip { font-size: 10.5px; font-weight: 700; background: #fff; border: 1.5px solid currentColor; padding: 2px 9px; border-radius: 999px; }

/* zoom / fit controls */
#graph-controls { position: absolute; right: 18px; bottom: 18px; display: flex; flex-direction: column; gap: 6px; z-index: 30; }
#graph-controls button { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--line); background: var(--panel); color: var(--ink); font-size: 17px; font-weight: 700; box-shadow: var(--sh-2); cursor: pointer; transition: all .12s; }
#graph-controls button:hover { border-color: var(--accent); color: var(--accent); }
#graph-controls button:nth-child(3) { font-size: 12px; font-weight: 700; }
#focus-btn { width: auto !important; padding: 0 12px; font-size: 12px; font-weight: 700; white-space: nowrap; }
#focus-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
#expand-btn, #collapse-btn, #summary-btn, #restart-btn { width: auto !important; padding: 0 14px; font-size: 12px; font-weight: 700; white-space: nowrap; }
#expand-btn:hover, #collapse-btn:hover, #summary-btn:hover, #restart-btn:hover { border-color: var(--accent); color: var(--accent); }

/* full-screen: collapse all chrome above the tree */
body.fullscreen #topbar, body.fullscreen #intro,
body.fullscreen #session-bar, body.fullscreen #path-bar, body.fullscreen #phase-rail { display: none !important; }
body.fullscreen #graph { height: 100vh !important; }

#intro {
  background: var(--panel); border-bottom: 1px solid var(--line);
  padding: 10px 24px; font-size: 12px; line-height: 1.55; color: var(--muted);
}
#intro strong { color: var(--ink); font-weight: 680; }

/* path breadcrumb */
#path-bar {
  position: sticky; top: 112px; z-index: 70;
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  padding: 8px 24px; background: rgba(255,255,255,.92); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
}
.path-label { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
.path-crumb { font-size: 11px; background: var(--bg); border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; cursor: pointer; color: var(--text); }
.path-crumb:hover { border-color: var(--accent); color: var(--accent); }
.path-nid { font-weight: 800; color: var(--accent-d); }
.path-sep { color: var(--faint); font-weight: 700; }


/* ============================================================
   Post-it notes
   ============================================================ */
.postit {
  position: relative; margin-top: 10px;
  background: linear-gradient(180deg, #fff7c2, #fff08a);
  border: 1px solid #f2d35a; border-radius: 4px 10px 10px 4px;
  padding: 9px 11px; box-shadow: 2px 3px 10px rgba(120,90,0,.18);
  color: #4a3b00;
}
.postit::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; background: #e3b900; border-radius: 3px; }
.postit-author { font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: #8a6d00; margin-bottom: 3px; }
.postit-text { font-size: 12px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
.postit-acts { display: flex; gap: 2px; position: absolute; top: 5px; right: 5px; opacity: 0; transition: opacity .15s; }
.postit:hover .postit-acts { opacity: 1; }

/* ============================================================
   Icon buttons
   ============================================================ */
.icon-btn {
  height: 20px; padding: 0 7px; display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid transparent; background: transparent; border-radius: 6px; cursor: pointer;
  font-size: 10px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase;
  color: var(--faint); transition: all .12s; line-height: 1;
}
.icon-btn:hover { background: var(--bg); color: var(--ink); border-color: var(--line); }
.icon-del:hover { background: #fdeced; color: var(--red); }
.icon-note:hover { background: #fff6c2; color: #8a6d00; }

/* ============================================================
   Note editor popup
   ============================================================ */
#note-backdrop { position: fixed; inset: 0; background: rgba(11,18,32,.45); z-index: 220; }
#note-editor { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 230; width: 380px; max-width: 94vw; }
.ne-card { background: var(--panel); border-radius: var(--r-lg); box-shadow: var(--sh-3); padding: 18px 20px 16px; }
.ne-head { display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.ne-target { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
#note-editor textarea {
  width: 100%; height: 110px; resize: vertical; border: 1px solid var(--line); border-radius: 10px;
  padding: 10px 12px; font-family: inherit; font-size: 13px; outline: none; background: #fffdf2;
}
#note-editor textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,11,.15); }
#note-editor input {
  width: 100%; margin-top: 8px; border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px;
  font-family: inherit; font-size: 13px; outline: none;
}
#note-editor input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,111,224,.12); }
.ne-actions { display: flex; align-items: center; gap: 8px; margin-top: 14px; }


/* ============================================================
   Buttons
   ============================================================ */
button { cursor: pointer; border: none; font-family: inherit; }
.btn-primary { background: linear-gradient(180deg, var(--accent), var(--accent-d)); color: #fff; padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: var(--sh-1); transition: filter .15s, transform .1s; }
.btn-primary:hover { filter: brightness(1.06); }
.btn-primary:active { transform: translateY(1px); }
.btn-primary:disabled { opacity: .6; cursor: default; }
.btn-compact { padding: 7px 14px; font-size: 12.5px; }
.btn-outline { background: transparent; border: 1px solid rgba(255,255,255,.3); color: #fff; padding: 6px 13px; border-radius: 9px; font-size: 12px; transition: all .15s; }
.btn-outline:hover { border-color: #fff; background: rgba(255,255,255,.1); }
.btn-ghost { background: transparent; color: var(--muted); padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 550; transition: background .15s; }
.btn-ghost:hover { background: var(--bg); }
.btn-danger { background: var(--red); color: #fff; padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; transition: filter .15s; }
.btn-danger:hover { filter: brightness(1.05); }
